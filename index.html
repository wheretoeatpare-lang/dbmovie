<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Getmypopcornnow — Watch Free</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#080a0f;--surface:#0e1117;--card:#12151d;--border:#1e2330;
  --accent:#e63946;--accent2:#f4a261;--text:#e8eaf0;--muted:#6b7280;--r:10px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.35}

/* NAV */
nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:14px 32px;background:rgba(8,10,15,.88);backdrop-filter:blur(18px);border-bottom:1px solid var(--border)}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.55rem;letter-spacing:2px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-tabs{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:4px}
.tab{padding:7px 18px;border-radius:6px;border:none;background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.875rem;font-weight:500;cursor:pointer;transition:all .2s}
.tab.active,.tab:hover{background:var(--accent);color:#fff}
.search-wrap{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 14px}
.search-wrap input{background:none;border:none;outline:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.875rem;width:200px}
.search-wrap input::placeholder{color:var(--muted)}

/* HERO */
#hero{position:relative;height:72vh;min-height:460px;display:flex;align-items:flex-end;padding:52px 44px;overflow:hidden}
#hero-bg{position:absolute;inset:0;background:#0d0f1a}
#hero-bg img{width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 1s ease}
#hero-bg img.show{opacity:.32}
#hero::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,var(--bg) 0%,rgba(8,10,15,.5) 50%,transparent 100%),linear-gradient(to right,var(--bg) 0%,transparent 55%)}
.hero-content{position:relative;z-index:2;max-width:580px}
.hero-badge{display:inline-flex;align-items:center;gap:6px;background:var(--accent);color:#fff;font-size:.68rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:4px 10px;border-radius:4px;margin-bottom:14px}
#hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.6rem,5vw,4.2rem);line-height:1;letter-spacing:1px;margin-bottom:14px}
#hero-overview{color:#a0aec0;font-size:.9rem;line-height:1.65;margin-bottom:26px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.hero-btns{display:flex;gap:12px}
.btn-play{display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:#fff;border:none;padding:13px 26px;border-radius:var(--r);font-family:'DM Sans',sans-serif;font-weight:700;font-size:.9rem;cursor:pointer;transition:transform .2s,box-shadow .2s}
.btn-play:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(230,57,70,.45)}

/* HERO POSTER STRIP */
#hero-strip{
  position:absolute;bottom:0;left:0;right:0;z-index:3;
  padding:0 44px 18px;
  overflow:hidden;
}
.hstrip-inner{
  display:flex;gap:10px;
  overflow-x:auto;scroll-snap-type:x mandatory;
  scrollbar-width:none;-ms-overflow-style:none;
  padding-bottom:4px;
}
.hstrip-inner::-webkit-scrollbar{display:none}
.hstrip-card{
  flex:0 0 80px;scroll-snap-align:start;
  border-radius:7px;overflow:hidden;cursor:pointer;
  border:2px solid transparent;
  transition:border-color .2s,transform .2s,box-shadow .2s;
  position:relative;
}
.hstrip-card img{
  width:80px;height:120px;object-fit:cover;display:block;
}
.hstrip-card:hover{
  border-color:var(--accent);
  transform:translateY(-4px);
  box-shadow:0 8px 24px rgba(230,57,70,.5);
}
.hstrip-card.active-strip{
  border-color:var(--accent2);
  box-shadow:0 0 0 2px var(--accent2);
}
@media(max-width:768px){#hero-strip{padding:0 14px 12px}.hstrip-card{flex:0 0 62px}.hstrip-card img{width:62px;height:93px}}
main{padding:0 32px 72px;max-width:1400px;margin:0 auto}
.sec-hdr{display:flex;align-items:center;margin:44px 0 20px}
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:1.65rem;letter-spacing:1px}
.sec-title span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:16px}
.card{position:relative;border-radius:var(--r);overflow:hidden;background:var(--card);border:1px solid var(--border);cursor:pointer;transition:transform .25s,box-shadow .25s}
.card:hover{transform:translateY(-7px) scale(1.025);box-shadow:0 18px 44px rgba(0,0,0,.65)}
.card:hover .c-overlay{opacity:1}
.card-img{aspect-ratio:2/3;width:100%;object-fit:cover;display:block;background:var(--surface)}
.c-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.96) 0%,rgba(0,0,0,.15) 55%,transparent 100%);opacity:0;transition:opacity .25s;display:flex;align-items:center;justify-content:center}
.play-circle{width:50px;height:50px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(230,57,70,.55);margin-bottom:64px}
.play-circle svg{fill:#fff;margin-left:3px}
.c-info{position:absolute;bottom:0;left:0;right:0;padding:12px 10px;background:linear-gradient(transparent,rgba(0,0,0,.93))}
.c-title{font-size:.78rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:5px}
.c-meta{display:flex;gap:6px;align-items:center;font-size:.66rem;color:var(--muted)}
.badge-type{background:var(--accent);color:#fff;font-size:.6rem;font-weight:700;padding:2px 6px;border-radius:3px;letter-spacing:.5px}
.badge-q{background:rgba(244,162,97,.18);color:var(--accent2);font-size:.6rem;font-weight:700;padding:2px 6px;border-radius:3px}

/* Quality badge — always visible, pops on hover */
.q-pin{
  position:absolute;top:8px;left:8px;z-index:3;
  font-size:.6rem;font-weight:800;letter-spacing:.8px;
  padding:3px 8px;border-radius:4px;
  pointer-events:none;
  text-transform:uppercase;
  opacity:.82;
  transform:scale(1);
  transition:opacity .2s,transform .2s;
}
.card:hover .q-pin{opacity:1;transform:scale(1.08)}
.q-4k    {background:#e63946;color:#fff;box-shadow:0 2px 10px rgba(230,57,70,.6)}
.q-1080  {background:#16a34a;color:#fff;box-shadow:0 2px 10px rgba(22,163,74,.5)}
.q-hd    {background:#2563eb;color:#fff;box-shadow:0 2px 10px rgba(37,99,235,.5)}
.q-hdrip {background:#7c3aed;color:#fff;box-shadow:0 2px 10px rgba(124,58,237,.5)}
.q-cam   {background:#b45309;color:#fff;box-shadow:0 2px 10px rgba(180,83,9,.5)}
.q-ts    {background:#b45309;color:#fff;box-shadow:0 2px 10px rgba(180,83,9,.5)}
.q-other {background:rgba(255,255,255,.18);color:#e8eaf0;backdrop-filter:blur(4px)}

/* SKELETON */
.skel{background:linear-gradient(90deg,var(--card) 25%,var(--surface) 50%,var(--card) 75%);background-size:200% 100%;animation:shim 1.4s infinite;border-radius:var(--r)}
@keyframes shim{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-card{aspect-ratio:2/3}
.empty{grid-column:1/-1;text-align:center;color:var(--muted);padding:48px;font-size:.9rem}

/* MODAL */
#modal{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.93);backdrop-filter:blur(14px);flex-direction:column;align-items:center;justify-content:center;padding:20px}
#modal.open{display:flex}
.modal-box{background:var(--card);border:1px solid var(--border);border-radius:14px;width:100%;max-width:960px;overflow:hidden;animation:popIn .25s cubic-bezier(.175,.885,.32,1.275) both}
@keyframes popIn{from{transform:scale(.88);opacity:0}to{transform:scale(1);opacity:1}}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
#modal-title{font-family:'Bebas Neue',sans-serif;font-size:1.45rem;letter-spacing:1px}
.modal-x{width:32px;height:32px;border-radius:50%;background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:1.1rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s}
.modal-x:hover{background:var(--accent)}
.modal-player{position:relative;aspect-ratio:16/9;width:100%;background:#000}
.modal-player iframe{width:100%;height:100%;border:none}
.modal-ftr{padding:14px 20px;display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.modal-overview{color:var(--muted);font-size:.82rem;line-height:1.55;flex:1;min-width:200px}
.ep-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.ep-sel{background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-family:'DM Sans',sans-serif;font-size:.8rem;cursor:pointer;outline:none}
.ep-go{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:7px 16px;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:700;cursor:pointer}

@media(max-width:768px){nav{padding:12px 16px}.search-wrap input{width:120px}main{padding:0 14px 60px}#hero{padding:28px 18px}.grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px}}
@media(max-width:480px){.nav-tabs{display:none}.grid{grid-template-columns:repeat(3,1fr)}}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<nav>
  <div class="logo">Getmypopcornnow</div>
  <div class="nav-tabs">
    <button class="tab active" data-tab="movie" onclick="switchTab(this)">Movies</button>
    <button class="tab" data-tab="tv" onclick="switchTab(this)">TV Shows</button>
  </div>
  <div class="search-wrap">
    <span>🔍</span>
    <input id="q" type="text" placeholder="Search titles…"/>
  </div>
</nav>

<div id="hero">
  <div id="hero-bg"><img id="hbg" src="" alt=""/></div>
  <div class="hero-content">
    <div class="hero-badge">🔥 Trending Now</div>
    <div id="hero-title">Loading…</div>
    <div id="hero-overview"></div>
    <div class="hero-btns">
      <button class="btn-play" id="hero-btn">▶ Watch Now</button>
    </div>
  </div>
  <div id="hero-strip"><div class="hstrip-inner" id="hstrip"></div></div>
</div>
  <div class="sec-hdr"><div class="sec-title" id="t1">🆕 New <span>Releases</span></div></div>
  <div class="grid" id="g1"></div>
  <div class="sec-hdr"><div class="sec-title" id="t2">📅 Recently <span>Added</span></div></div>
  <div class="grid" id="g2"></div>
</main>

<div id="modal">
  <div class="modal-box">
    <div class="modal-hdr">
      <div id="modal-title">—</div>
      <button class="modal-x" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-player">
      <iframe id="pframe" allowfullscreen allow="autoplay;fullscreen"></iframe>
    </div>
    <div class="modal-ftr">
      <div class="modal-overview" id="modal-ov"></div>
      <div class="ep-row" id="ep-row" style="display:none">
        <select class="ep-sel" id="s-sel" onchange="fillEps()"></select>
        <select class="ep-sel" id="e-sel"></select>
        <button class="ep-go" onclick="goEp()">Go</button>
      </div>
    </div>
  </div>
</div>

<script>
/* ── CONFIG ──────────────────────────────────── */
const VSRC     = 'https://vidsrc.to';
// TMDB key – get your own free at https://www.themoviedb.org/settings/api
// Using TMDB's trending endpoint means ONE request gets 20 items WITH posters
const TKEY     = '8265bd1679663a7ea12ac168da84d2e8';
const TIMG     = 'https://image.tmdb.org/t/p/';
// CORS proxy to fetch VidSrc API (avoids CORS block in browser)
const PROXY    = 'https://corsproxy.io/?url=';

/* ── STATE ───────────────────────────────────── */
let mediaType  = 'movie';
let curItem    = null;
const cache    = {};

/* ── HELPERS ─────────────────────────────────── */
const $  = id => document.getElementById(id);
const qs = s  => document.querySelector(s);

function skels(grid, n=12){
  grid.innerHTML = Array(n).fill(`<div class="skel skel-card"></div>`).join('');
}

/* ── TMDB fetch (trending gives poster in one call) ── */
async function tmdbTrending(type, page=1){
  const k = `trend_${type}_${page}`;
  if(cache[k]) return cache[k];
  try{
    const r = await fetch(`https://api.themoviedb.org/3/trending/${type}/week?api_key=${TKEY}&page=${page}`);
    const d = await r.json();
    cache[k] = d.results || [];
    return cache[k];
  }catch{ return []; }
}

async function tmdbSearch(query, type){
  try{
    const r = await fetch(`https://api.themoviedb.org/3/search/${type}?api_key=${TKEY}&query=${encodeURIComponent(query)}`);
    const d = await r.json();
    return d.results || [];
  }catch{ return []; }
}

async function tmdbById(id, type){
  const k = `${type}_${id}`;
  if(cache[k]) return cache[k];
  try{
    const r = await fetch(`https://api.themoviedb.org/3/${type}/${id}?api_key=${TKEY}`);
    const d = await r.json();
    cache[k] = d;
    return d;
  }catch{ return null; }
}

/* ── VidSrc API ── */
async function vsrcList(type, endpoint){
  const pfx  = type === 'movie' ? 'movie' : 'tv';
  const url  = `${VSRC}/vapi/${pfx}/${endpoint}`;
  try{
    // Try direct first (works if CORS is open), fall back to proxy
    let r;
    try{
      r = await fetch(url);
      if(!r.ok) throw new Error();
    }catch{
      r = await fetch(PROXY + encodeURIComponent(url));
    }
    const j = await r.json();
    return j?.result?.items || j?.result || [];
  }catch(e){
    console.warn('vsrc fetch failed', e);
    return [];
  }
}

/* ── Match VidSrc items with TMDB data by tmdb_id ── */
async function enrichItems(vsItems, tmdbItems, type){
  // Build a lookup from tmdb_id → tmdb data
  const lookup = {};
  tmdbItems.forEach(t => { lookup[String(t.id)] = t; });

  return vsItems.map(v => {
    const tmdb = lookup[String(v.tmdb_id)] || null;
    return { ...v, tmdb };
  });
}

/* ── RENDER CARD ── */
function makeCard(item, type){
  const card  = document.createElement('div');
  card.className = 'card';

  const tmdb    = item.tmdb;
  const title   = tmdb ? (tmdb.title || tmdb.name) : (item.title || item.name || '?');
  const poster  = tmdb?.poster_path ? `${TIMG}w342${tmdb.poster_path}` : '';
  const year    = (tmdb?.release_date || tmdb?.first_air_date || '').slice(0,4);
  const rawQ    = item.quality || '';
  const fallback= `https://placehold.co/300x450/12151d/555555?text=${encodeURIComponent(title)}`;

  // ── Infer quality label ──────────────────────────────────────────────────
  // Priority: use VidSrc quality string if present, otherwise derive from TMDB data
  function inferQuality(raw, tmdb, yr){
    if(raw){
      if(/4k|2160/i.test(raw))  return {label:'4K',   cls:'q-4k'};
      if(/1080/i.test(raw))     return {label:'1080p', cls:'q-1080'};
      if(/720/i.test(raw))      return {label:'HD',    cls:'q-hd'};
      if(/hdrip/i.test(raw))    return {label:'HDRip', cls:'q-hdrip'};
      if(/\bts\b|telesync/i.test(raw)) return {label:'TS', cls:'q-ts'};
      if(/\bcam\b/i.test(raw))  return {label:'CAM',   cls:'q-cam'};
      return {label: raw.toUpperCase().slice(0,6), cls:'q-other'};
    }
    // Derive from TMDB signals
    const votes  = tmdb?.vote_count   || 0;
    const pop    = tmdb?.popularity   || 0;
    const rating = tmdb?.vote_average || 0;
    const releaseYear = parseInt(yr) || 0;
    const nowYear     = new Date().getFullYear();
    const age         = nowYear - releaseYear;

    // Very new (< 2 weeks feel) + low votes → likely CAM or TS
    if(releaseYear === nowYear && votes < 40 && pop < 30)
      return {label:'CAM', cls:'q-cam'};
    // New release, moderate traction → HDRip
    if(releaseYear >= nowYear - 1 && votes < 200 && pop < 80)
      return {label:'HDRip', cls:'q-hdrip'};
    // Established recent film or popular show
    if(votes >= 200 || pop >= 80)
      return {label:'HD', cls:'q-hd'};
    // Older or well-known catalogue title
    if(age >= 2 && (votes >= 500 || rating >= 7))
      return {label:'1080p', cls:'q-1080'};
    return {label:'HD', cls:'q-hd'};
  }

  const {label: qLabel, cls: qClass} = inferQuality(rawQ, tmdb, year);

  card.innerHTML = `
    <img class="card-img" src="${poster || fallback}" alt="${title}" loading="lazy"
         onerror="this.src='${fallback}'"/>
    <div class="q-pin ${qClass}">${qLabel}</div>
    <div class="c-overlay">
      <div class="play-circle">
        <svg width="18" height="18" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </div>
    </div>
    <div class="c-info">
      <div class="c-title">${title}</div>
      <div class="c-meta">
        <span class="badge-type">${type==='movie'?'MOVIE':'TV'}</span>
        ${year?`<span>${year}</span>`:''}
      </div>
    </div>`;

  card.addEventListener('click', ()=>{
    openModal({
      imdb   : item.imdb_id || '',
      tmdb_id: item.tmdb_id || (tmdb?.id ? String(tmdb.id) : ''),
      title,
      type,
      overview: tmdb?.overview || '',
      backdrop: tmdb?.backdrop_path ? `${TIMG}original${tmdb.backdrop_path}` : '',
      seasons : tmdb?.number_of_seasons || 1,
      quality : qLabel
    });
  });

  return card;
}

/* ── HERO STRIP ── */
let heroItems = [];
let heroType  = 'movie';

function buildHeroStrip(items, type){
  heroItems = items;
  heroType  = type;
  const strip = $('hstrip');
  strip.innerHTML = '';
  items.slice(0,12).forEach((item, idx) => {
    const tmdb   = item.tmdb;
    if(!tmdb) return;
    const poster = tmdb.poster_path ? `${TIMG}w185${tmdb.poster_path}` : '';
    const title  = tmdb.title || tmdb.name || '';
    const fallback = `https://placehold.co/80x120/12151d/555555?text=${encodeURIComponent(title.slice(0,4))}`;
    const sc = document.createElement('div');
    sc.className = 'hstrip-card' + (idx===0?' active-strip':'');
    sc.innerHTML = `<img src="${poster||fallback}" alt="${title}" loading="lazy" onerror="this.src='${fallback}'"/>`;
    sc.addEventListener('click', ()=>{
      document.querySelectorAll('.hstrip-card').forEach(c=>c.classList.remove('active-strip'));
      sc.classList.add('active-strip');
      setHero(item, type);
    });
    strip.appendChild(sc);
  });
}


function setHero(item, type){
  const tmdb   = item.tmdb;
  if(!tmdb) return;
  const title  = tmdb.title || tmdb.name || '';
  const ov     = tmdb.overview || '';
  const bd     = tmdb.backdrop_path ? `${TIMG}original${tmdb.backdrop_path}` : '';
  const imdb   = item.imdb_id || '';
  const tmdbId = item.tmdb_id || String(tmdb.id);
  const seasons= tmdb.number_of_seasons || 1;

  $('hero-title').textContent   = title;
  $('hero-overview').textContent= ov;

  if(bd){
    const img = $('hbg');
    img.onload = ()=> img.classList.add('show');
    img.src = bd;
  }

  $('hero-btn').onclick = ()=> openModal({
    imdb: imdb, tmdb_id: tmdbId, title, type,
    overview: ov, backdrop: bd, seasons, quality: item.quality||''
  });
}

/* ── LOAD SECTION ── */
async function loadSection(type, vsEndpoint, tmdbPage, gridId){
  const grid = $(gridId);
  skels(grid);

  // Fetch both in parallel
  const [vsItems, tmdbItems] = await Promise.all([
    vsrcList(type, vsEndpoint),
    tmdbTrending(type, tmdbPage)
  ]);

  // If VidSrc returned nothing, just show TMDB trending with dummy imdb ids
  const source = vsItems.length
    ? await enrichItems(vsItems, tmdbItems, type)
    : tmdbItems.map(t=>({ tmdb_id: String(t.id), imdb_id:'', quality:'', tmdb: t }));

  grid.innerHTML = '';
  if(!source.length){
    grid.innerHTML = '<div class="empty">Nothing to show right now.</div>';
    return source;
  }
  source.forEach(item => grid.appendChild(makeCard(item, type)));
  return source;
}

/* ── OPEN MODAL ── */
function openModal(d){
  curItem = d;
  const id = d.imdb || d.tmdb_id;
  $('modal-title').textContent = d.title || '—';
  $('modal-ov').textContent    = d.overview || '';
  $('modal').classList.add('open');
  document.body.style.overflow = 'hidden';

  const epRow = $('ep-row');
  const frame = $('pframe');

  if(d.type === 'movie'){
    epRow.style.display = 'none';
    frame.src = `${VSRC}/embed/movie/${id}`;
  } else {
    epRow.style.display = 'flex';
    const n = parseInt(d.seasons)||1;
    $('s-sel').innerHTML = Array.from({length:n},(_,i)=>`<option value="${i+1}">Season ${i+1}</option>`).join('');
    fillEps();
    frame.src = `${VSRC}/embed/tv/${id}/1/1`;
  }
}

function fillEps(){
  $('e-sel').innerHTML = Array.from({length:30},(_,i)=>`<option value="${i+1}">Episode ${i+1}</option>`).join('');
}

function goEp(){
  if(!curItem) return;
  const id = curItem.imdb || curItem.tmdb_id;
  $('pframe').src = `${VSRC}/embed/tv/${id}/${$('s-sel').value}/${$('e-sel').value}`;
}

function closeModal(){
  $('modal').classList.remove('open');
  $('pframe').src = '';
  document.body.style.overflow = '';
  curItem = null;
}

$('modal').addEventListener('click', e=>{ if(e.target===$('modal')) closeModal(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

/* ── SEARCH ── */
let st;
$('q').addEventListener('input', e=>{
  clearTimeout(st);
  const v = e.target.value.trim();
  if(!v){ init(); return; }
  st = setTimeout(()=> doSearch(v), 480);
});

async function doSearch(q){
  $('t1').innerHTML = `🔍 Search <span>Results</span>`;
  $('t2').innerHTML = '';
  const g1 = $('g1'); const g2 = $('g2');
  skels(g1, 8); g2.innerHTML = '';

  const type    = mediaType;
  const results = await tmdbSearch(q, type);
  g1.innerHTML  = '';
  if(!results.length){ g1.innerHTML='<div class="empty">No results.</div>'; return; }

  results.forEach(t=>{
    const fakeItem = { imdb_id:'', tmdb_id: String(t.id), quality:'', tmdb: t };
    g1.appendChild(makeCard(fakeItem, type));
  });
}

/* ── SWITCH TAB ── */
function switchTab(btn){
  document.querySelectorAll('.tab').forEach(t=> t.classList.remove('active'));
  btn.classList.add('active');
  mediaType = btn.dataset.tab;
  $('q').value = '';
  init();
}

/* ── INIT ── */
async function init(){
  const t = mediaType;
  $('t1').innerHTML = `🆕 New <span>Releases</span>`;
  $('t2').innerHTML = `📅 Recently <span>Added</span>`;
  $('hero-title').textContent    = 'Loading…';
  $('hero-overview').textContent = '';
  const img = $('hbg');
  img.classList.remove('show');
  img.src = '';

  const [sec1] = await Promise.all([
    loadSection(t, 'new', 1, 'g1'),
    loadSection(t, 'add', 2, 'g2'),
  ]);

  // Hero: pick first item that has a backdrop
  const hero = sec1.find(i=> i.tmdb?.backdrop_path) || sec1[0];
  if(hero) setHero(hero, t);
  buildHeroStrip(sec1, t);
}

init();
</script>
</body>
